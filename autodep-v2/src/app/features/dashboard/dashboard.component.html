<div class="layout-wrapper p-4">
  <header class="flex align-items-center justify-content-between mb-4">
    <div>
      <h1 class="text-3xl font-bold m-0 text-primary">AutoDep</h1>
      <p class="text-500 m-0 mt-1">Análise de dependências entre classes</p>
    </div>

    <div class="flex gap-2 align-items-center">
      <span
        *ngIf="facade.selectedPath()"
        class="text-sm border-round surface-100 px-3 py-2 text-600"
      >
        <i class="pi pi-folder mr-2"></i> {{ facade.selectedPath() }}
      </span>
      <p-button
        label="Selecionar projeto"
        icon="pi pi-folder-open"
        severity="secondary"
        (onClick)="facade.selectProjectFolder()"
      />
      <p-button
        label="Analisar"
        icon="pi pi-play"
        [disabled]="!facade.selectedPath()"
        [loading]="facade.isLoading()"
        (onClick)="facade.runAnalysis()"
      />
    </div>
  </header>

  <p-card
    *ngIf="facade.error()"
    styleClass="bg-red-50 text-red-700 mb-4 border-none border-left-3 border-red-500"
  >
    <div class="flex align-items-center">
      <i class="pi pi-exclamation-circle text-2xl mr-3"></i>
      <div>
        <h3 class="m-0 text-lg">Erro na análise</h3>
        <p class="m-0 mt-1">{{ facade.error() }}</p>
      </div>
    </div>
  </p-card>

  <div
    *ngIf="facade.isLoading()"
    class="flex flex-column align-items-center justify-content-center py-8"
  >
    <i class="pi pi-spin pi-spinner text-6xl text-primary mb-3"></i>
    <p class="text-xl text-600">Analisando o projeto, por favor aguarde...</p>
  </div>

  <main *ngIf="facade.analysisData() as data">
    <app-summary-cards [summary]="data.summary" class="block mb-4"></app-summary-cards>

    <div class="grid mb-4">
      <div class="col-12 xl:col-8">
        <app-dependency-graph
          [nodes]="data.nodes"
          [edges]="data.edges"
          [activeCategories]="facade.activeCategories()"
          (nodeSelected)="facade.selectNode($event)"
          (categoryToggled)="onCategoryToggled($event)"
        ></app-dependency-graph>
      </div>
      <div class="col-12 xl:col-4">
        <app-metrics-panel
          *ngIf="facade.selectedNode() as selected"
          [node]="selected"
          class="block mb-3"
        ></app-metrics-panel>
        <app-coupling-ranking [nodes]="data.nodes"></app-coupling-ranking>
      </div>
    </div>

    <div class="grid">
      <div class="col-12">
        <app-class-table [nodes]="data.nodes"></app-class-table>
      </div>
    </div>
  </main>

  <div
    *ngIf="!facade.analysisData() && !facade.isLoading()"
    class="flex flex-column align-items-center justify-content-center py-8 opacity-50"
  >
    <i class="pi pi-box text-8xl mb-4"></i>
    <h2 class="text-2xl m-0 font-medium">Nenhum projeto analisado</h2>
    <p class="mt-2 text-lg">
      Selecione uma pasta e clique em "Analisar" para visualizar os resultados.
    </p>
  </div>
</div>
