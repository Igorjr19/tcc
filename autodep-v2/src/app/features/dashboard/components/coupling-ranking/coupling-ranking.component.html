<div class="card p-3 shadow-2 border-round surface-card h-full">
  <h3 class="m-0 mb-3">Top 10 Classes Acopladas</h3>

  <ul class="list-none p-0 m-0 w-full">
    <li *ngFor="let cls of topClasses(); let i = index" class="mb-3 border-bottom-1 surface-border pb-2">
      <div class="flex justify-content-between align-items-center w-full">
        
        <div class="flex-1 overflow-hidden pr-3">
          <div class="font-medium text-800 white-space-nowrap overflow-hidden text-overflow-ellipsis" [title]="cls.simpleName">
            {{ i + 1 }}. {{ cls.simpleName }}
          </div>
          <div class="text-sm text-500 white-space-nowrap overflow-hidden text-overflow-ellipsis" [title]="cls.packageName">
            {{ cls.packageName }}
          </div>
        </div>
        
        <div class="font-bold text-primary flex-shrink-0 text-right">
          <span class="text-xl">{{ cls.totalCoupling }}</span>
          <span class="text-xs ml-1 font-normal">CBO</span>
        </div>
        
      </div>
    </li>
  </ul>
</div>
