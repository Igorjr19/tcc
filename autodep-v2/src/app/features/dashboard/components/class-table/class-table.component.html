<div class="card p-3 shadow-2 border-round surface-card">
  <p-table
    [value]="nodes()"
    [paginator]="true"
    [rows]="15"
    [rowsPerPageOptions]="[15, 30, 50]"
    [globalFilterFields]="['simpleName', 'packageName']"
    [scrollable]="true"
    scrollHeight="450px"
    #dt
  >
    <ng-template pTemplate="caption">
      <div class="flex justify-content-between align-items-center">
        <h3 class="m-0">Detalhes das Classes</h3>
        <div class="flex align-items-center gap-2">
          <span class="p-input-icon-left">
            <i class="pi pi-search"></i>
            <input
              pInputText
              type="text"
              (input)="dt.filterGlobal($event.target.value, 'contains')"
              placeholder="Buscar..."
              class="p-inputtext p-component p-element"
            />
          </span>
          <p-button
            icon="pi pi-download"
            label="CSV"
            severity="secondary"
            size="small"
            (onClick)="exportCsv()"
          />
        </div>
      </div>
    </ng-template>

    <ng-template pTemplate="header">
      <tr>
        <th pSortableColumn="simpleName" style="min-width: 10rem">
          Classe <p-sortIcon field="simpleName"></p-sortIcon>
        </th>
        <th pSortableColumn="packageName" style="min-width: 12rem">
          Pacote <p-sortIcon field="packageName"></p-sortIcon>
        </th>
        <th style="width: 5rem">Tipo</th>
        <th pSortableColumn="metrics.cbo" style="width: 5rem">
          CBO <p-sortIcon field="metrics.cbo"></p-sortIcon>
        </th>
        <th pSortableColumn="metrics.lcom" style="width: 5rem">
          LCOM <p-sortIcon field="metrics.lcom"></p-sortIcon>
        </th>
        <th pSortableColumn="metrics.dit" style="width: 4rem">
          DIT <p-sortIcon field="metrics.dit"></p-sortIcon>
        </th>
        <th pSortableColumn="metrics.noc" style="width: 4rem">
          NOC <p-sortIcon field="metrics.noc"></p-sortIcon>
        </th>
        <th pSortableColumn="metrics.rfc" style="width: 5rem">
          RFC <p-sortIcon field="metrics.rfc"></p-sortIcon>
        </th>
        <th pSortableColumn="metrics.linesOfCode" style="width: 5rem">
          LOC <p-sortIcon field="metrics.linesOfCode"></p-sortIcon>
        </th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-node>
      <tr>
        <td class="font-medium text-800">{{ node.simpleName }}</td>
        <td class="text-500 text-sm">{{ node.packageName }}</td>
        <td>
          <p-tag
            [value]="node.type"
            [severity]="
              node.isInterface ? 'info' : node.isAbstract ? 'warn' : node.type === 'ENUM' ? 'contrast' : 'secondary'
            "
          ></p-tag>
        </td>
        <td class="text-center">
          <p-tag [value]="node.metrics.cbo.toString()" [severity]="getCboSeverity(node.metrics.cbo)"></p-tag>
        </td>
        <td class="text-center">
          <p-tag
            [value]="node.metrics.lcom.toFixed(2)"
            [severity]="getLcomSeverity(node.metrics.lcom)"
          ></p-tag>
        </td>
        <td class="text-center">{{ node.metrics.dit }}</td>
        <td class="text-center">{{ node.metrics.noc }}</td>
        <td class="text-center">{{ node.metrics.rfc }}</td>
        <td class="text-center">{{ node.metrics.linesOfCode }}</td>
      </tr>
    </ng-template>

    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="9" class="text-center p-4">Nenhuma classe encontrada.</td>
      </tr>
    </ng-template>
  </p-table>
</div>
