<div class="grid mb-4">
  <div class="col-12 md:col-6 lg:col-3">
    <div
      class="surface-card shadow-2 p-3 border-round border-left-3 border-primary flex justify-content-between align-items-center"
    >
      <div>
        <span class="block text-500 font-medium mb-2">Total de Classes</span>
        <div class="text-900 font-medium text-2xl">{{ summary().totalClasses }}</div>
      </div>
      <div
        class="flex align-items-center justify-content-center bg-primary-50 border-round"
        style="width: 2.5rem; height: 2.5rem"
      >
        <i class="pi pi-box text-primary text-xl"></i>
      </div>
    </div>
  </div>

  <div class="col-12 md:col-6 lg:col-3">
    <div
      class="surface-card shadow-2 p-3 border-round border-left-3 border-blue-500 flex justify-content-between align-items-center"
    >
      <div>
        <span class="block text-500 font-medium mb-2">Total de Relações</span>
        <div class="text-900 font-medium text-2xl">{{ summary().totalRelationships }}</div>
      </div>
      <div
        class="flex align-items-center justify-content-center bg-blue-50 border-round"
        style="width: 2.5rem; height: 2.5rem"
      >
        <i class="pi pi-share-alt text-blue-500 text-xl"></i>
      </div>
    </div>
  </div>

  <div class="col-12 md:col-6 lg:col-3">
    <div
      class="surface-card shadow-2 p-3 border-round border-left-3 border-green-500 flex justify-content-between align-items-center"
    >
      <div>
        <span class="block text-500 font-medium mb-2">CBO Médio</span>
        <div class="text-900 font-medium text-2xl">
          {{ summary().averageCBO | number: '1.1-1' }}
        </div>
      </div>
      <div
        class="flex align-items-center justify-content-center bg-green-50 border-round"
        style="width: 2.5rem; height: 2.5rem"
      >
        <i class="pi pi-chart-line text-green-500 text-xl"></i>
      </div>
    </div>
  </div>

  <div class="col-12 md:col-6 lg:col-3">
    <div
      class="surface-card shadow-2 p-3 border-round border-left-3 border-orange-500 flex justify-content-between align-items-center"
    >
      <div>
        <span class="block text-500 font-medium mb-2">LCOM Médio</span>
        <div class="text-900 font-medium text-2xl">
          {{ summary().averageLCOM | number: '1.2-2' }}
        </div>
      </div>
      <div
        class="flex align-items-center justify-content-center bg-orange-50 border-round"
        style="width: 2.5rem; height: 2.5rem"
      >
        <i class="pi pi-percentage text-orange-500 text-xl"></i>
      </div>
    </div>
  </div>
</div>
