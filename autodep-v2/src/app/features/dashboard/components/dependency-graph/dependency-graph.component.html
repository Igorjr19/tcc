<div class="card p-3 shadow-2 border-round surface-card">
  <div class="flex justify-content-between align-items-center mb-3">
    <h3 class="m-0">Grafo de Dependências</h3>
    <div class="flex gap-2 align-items-center">
      <p-button
        *ngFor="let cat of categories"
        [label]="cat.label"
        size="small"
        [outlined]="!isCategoryActive(cat.key)"
        [style]="{ 'border-color': cat.color, color: isCategoryActive(cat.key) ? '#fff' : cat.color, 'background-color': isCategoryActive(cat.key) ? cat.color : 'transparent' }"
        (onClick)="categoryToggled.emit(cat.key)"
      />
      <span class="mx-1 surface-border border-left-1" style="height: 1.5rem"></span>
      <p-button
        icon="pi pi-image"
        severity="secondary"
        size="small"
        pTooltip="Exportar PNG"
        [outlined]="true"
        (onClick)="exportPng()"
      />
    </div>
  </div>
  <div #cyContainer class="cy-container"></div>
</div>
